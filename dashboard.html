<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediKiosk Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      color: #1a202c;
    }

    header {
      background: #1a56db;
      color: white;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 1.4rem; font-weight: 600; }

    header button {
      background: white;
      color: #1a56db;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
    }

    header button:hover { background: #e8f0fe; }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 32px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      text-align: center;
    }

    .card .icon { font-size: 2rem; margin-bottom: 10px; }

    .card .label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #718096;
      margin-bottom: 6px;
    }

    .card .value {
      font-size: 2rem;
      font-weight: 700;
      color: #1a56db;
    }

    .card .unit {
      font-size: 0.85rem;
      color: #a0aec0;
      margin-top: 2px;
    }

    .card .ts {
      font-size: 0.72rem;
      color: #cbd5e0;
      margin-top: 8px;
    }

    .section {
      padding: 0 32px 32px;
    }

    .section h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 14px;
      color: #2d3748;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      font-size: 0.88rem;
    }

    thead { background: #ebf4ff; }

    th, td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid #edf2f7;
    }

    th { font-weight: 600; color: #4a5568; font-size: 0.78rem; text-transform: uppercase; }

    tr:last-child td { border-bottom: none; }

    tr:hover td { background: #f7fafc; }

    .null { color: #cbd5e0; font-style: italic; }

    #status {
      text-align: center;
      padding: 60px;
      color: #a0aec0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<header>
  <h1>MediKiosk Dashboard</h1>
  <button onclick="loadData()">Refresh</button>
</header>

<div class="cards">
  <div class="card">
    <div class="icon">📏</div>
    <div class="label">Height</div>
    <div class="value" id="height">—</div>
    <div class="unit">cm</div>
  </div>
  <div class="card">
    <div class="icon">⚖️</div>
    <div class="label">Weight</div>
    <div class="value" id="weight">—</div>
    <div class="unit">g</div>
  </div>
  <div class="card">
    <div class="icon">❤️</div>
    <div class="label">Heart Rate</div>
    <div class="value" id="hr">—</div>
    <div class="unit">bpm</div>
  </div>
  <div class="card">
    <div class="icon">🩸</div>
    <div class="label">SpO2</div>
    <div class="value" id="spo2">—</div>
    <div class="unit">%</div>
  </div>
</div>

<div class="section">
  <h2>Recent Measurements</h2>
  <div id="status">Loading...</div>
  <table id="table" style="display:none">
    <thead>
      <tr>
        <th>Timestamp</th>
        <th>Height (cm)</th>
        <th>Weight (g)</th>
        <th>Heart Rate (bpm)</th>
        <th>SpO2 (%)</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
  const API = '';

  function fmt(val) {
    return val !== null && val !== undefined
      ? val
      : '<span class="null">—</span>';
  }

  function fmtTime(ts) {
    return new Date(ts).toLocaleString();
  }

  async function loadData() {
    document.getElementById('status').textContent = 'Loading...';
    document.getElementById('table').style.display = 'none';

    try {
      const res = await fetch(`${API}/measurements?limit=20`);
      const data = await res.json();

      if (!data.length) {
        document.getElementById('status').textContent = 'No measurements found.';
        return;
      }

      // Latest reading in cards
      const latest = data[0];
      document.getElementById('height').textContent = latest.height_cm ?? '—';
      document.getElementById('weight').textContent  = latest.weight_g  ?? '—';
      document.getElementById('hr').textContent      = latest.heart_rate_bpm ?? '—';
      document.getElementById('spo2').textContent    = latest.spo2_percent   ?? '—';

      // History table
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = data.map(r => `
        <tr>
          <td>${fmtTime(r.timestamp)}</td>
          <td>${fmt(r.height_cm)}</td>
          <td>${fmt(r.weight_g)}</td>
          <td>${fmt(r.heart_rate_bpm)}</td>
          <td>${fmt(r.spo2_percent)}</td>
        </tr>
      `).join('');

      document.getElementById('status').style.display = 'none';
      document.getElementById('table').style.display = 'table';

    } catch (e) {
      document.getElementById('status').textContent = 'Could not connect to API. Make sure the server is running.';
    }
  }

  loadData();
</script>
</body>
</html>
